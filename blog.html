  const card = document.createElement('div');
  card.className = 'article-card';
  card.innerHTML = `
    <div class="article-thumb">${a.emoji}</div>
    <div class="article-body">
      <div class="article-tag">${a.tag}</div>
      <div class="article-title">${a.title}</div>

        <div class="article-read">Lire →</div>
      </div>
    </div>
  `;
  card.addEventListener('click', () => openArticle(a));
  grid.appendChild(card);
});

function openArticle(a) {
  document.getElementById('articleContent').innerHTML = a.content;
  document.getElementById('articleModal').classList.add('show');
  document.body.style.overflow = 'hidden';
  document.getElementById('articleFull').scrollTop = 0;
}

function closeArticle() {
  document.getElementById('articleModal').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('articleModal').addEventListener('click', e => {
  if (e.target === document.getElementById('articleModal')) closeArticle();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeArticle();
});
</script>
