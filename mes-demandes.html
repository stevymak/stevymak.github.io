<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes demandes – Makouez IT</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090f;--bg2:#111120;--bg3:#16162a;
  --accent:#3b82f6;--accent2:#60a5fa;
  --text:#f0f0ff;--muted:#8888aa;
  --border:#ffffff14;--card:#ffffff08;--r:12px;
  --green:#22c55e;--orange:#f59e0b;--red:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1.5rem;gap:1.5rem}
h1,h2,h3{font-family:'Syne',sans-serif}

.back-link{color:var(--muted);text-decoration:none;font-size:0.85rem;align-self:flex-start;transition:color 0.2s}
.back-link:hover{color:var(--text)}

.page-header{text-align:center;max-width:480px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:1.5rem}
.logo span{color:var(--accent)}
.page-header h1{font-size:1.4rem;font-weight:700;margin-bottom:0.4rem}
.page-header p{color:var(--muted);font-size:0.88rem}

/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;gap:0.75rem;padding:3rem 0;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Liste des demandes */
.demandes-list{width:100%;max-width:560px;display:flex;flex-direction:column;gap:1rem}

.demande-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;text-decoration:none;color:var(--text);display:block;transition:border-color 0.2s,transform 0.2s}
.demande-card:hover{border-color:#3b82f640;transform:translateY(-2px)}
.demande-card-header{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.demande-card-service{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;display:flex;align-items:center;gap:0.5rem}
.status-badge{font-size:0.75rem;font-weight:600;padding:0.25rem 0.75rem;border-radius:99px;white-space:nowrap}
.status-badge.pending{background:#f59e0b18;color:var(--orange);border:1px solid #f59e0b30}
.status-badge.confirmed{background:#22c55e18;color:var(--green);border:1px solid #22c55e30}
.status-badge.done{background:#3b82f618;color:var(--accent2);border:1px solid #3b82f630}
.status-badge.cancelled{background:#ef444418;color:var(--red);border:1px solid #ef444430}
.demande-card-body{padding:1rem 1.25rem;display:flex;flex-direction:column;gap:0.5rem}
.demande-info-row{display:flex;align-items:center;gap:0.6rem;font-size:0.85rem;color:var(--muted)}
.demande-info-row span{color:var(--text)}
.demande-card-footer{padding:0.75rem 1.25rem;border-top:1px solid var(--border);font-size:0.8rem;color:var(--accent2);display:flex;align-items:center;justify-content:space-between}

/* Empty / error */
.empty-state{text-align:center;padding:2rem;max-width:400px}
.empty-icon{font-size:2.5rem;margin-bottom:1rem}
.empty-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:0.5rem}
.empty-sub{color:var(--muted);font-size:0.88rem;margin-bottom:1.5rem}

.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0.8rem 1.5rem;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:500;cursor:pointer;transition:opacity 0.2s;text-decoration:none;display:inline-block}
.btn-primary:hover{opacity:0.85}
.btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1.5rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block}
.btn-outline:hover{color:var(--text);border-color:#3b82f640}

.actions{display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center;margin-top:0.5rem}
</style>
</head>
<body>

<a class="back-link" href="index.html">← Retour au site</a>

<div class="page-header">
  <div class="logo">Makouez <span>IT</span></div>
  <h1>Mes demandes</h1>
  <p id="pageSubtitle">Chargement de vos réservations…</p>
</div>

<div id="mainContent">
  <div class="loader">
    <div class="spinner"></div>
    <span>Chargement…</span>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx6R4LC9HOt4wXbG2VmjI9nmLciwzDmz0",
  authDomain: "makouez-it.firebaseapp.com",
  projectId: "makouez-it",
  storageBucket: "makouez-it.firebasestorage.app",
  messagingSenderId: "558314427247",
  appId: "1:558314427247:web:83e656344dd79019ccce9a"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const STATUS_CONFIG = {
  pending:   { label: '⏳ En attente',  cls: 'pending'   },
  confirmed: { label: '✓ Confirmé',     cls: 'confirmed' },
  done:      { label: '✅ Terminé',     cls: 'done'      },
  cancelled: { label: '✗ Annulé',       cls: 'cancelled' },
};

const SERVICE_ICONS = {
  'Dépannage PC': '💻',
  'Installation Windows et logiciels': '🪟',
  'Réseau Wi-Fi': '📶',
  'Récupération de données': '💾',
  'Sauvegarde et sécurité': '🔒',
  'Formation et accompagnement': '🎓',
  'Intégration / Développement web': '🌐',
};

function formatDate(dateKey) {
  if (!dateKey) return '–';
  const parts = dateKey.split('-');
  if (parts.length !== 3) return dateKey;
  return new Date(parts[0], parts[1]-1, parts[2])
    .toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function formatCreatedAt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return 'Demande du ' + d.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const email  = params.get('email');
  const token  = params.get('token');

  // Vérification basique : on a besoin de l'email
  if (!email || !token) {
    showError('Lien invalide', 'Ce lien est invalide ou incomplet. Utilisez le bouton "Suivre ma demande" sur le site pour recevoir un nouveau lien.');
    return;
  }

  // Vérifier le token (simple hash email+secret)
  const expectedToken = await makeToken(email);
  if (token !== expectedToken) {
    showError('Lien expiré ou invalide', 'Ce lien n\'est plus valide. Demandez un nouveau lien depuis le site.');
    return;
  }

  try {
    const q = query(collection(db, 'reservations'), where('email', '==', email));
    const snap = await getDocs(q);

    if (snap.empty) {
      showEmpty(email);
      return;
    }

    const reservations = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

    renderList(reservations, email);
  } catch(e) {
    console.error(e);
    showError('Erreur de chargement', 'Impossible de charger vos réservations. Vérifiez votre connexion et réessayez.');
  }
}

// Token simple : hash de l'email + clé secrète côté client
// (suffisant pour éviter que quelqu'un devine l'URL d'un autre)
async function makeToken(email) {
  const secret = 'makouez-it-suivi-2025';
  const data   = email.toLowerCase().trim() + ':' + secret;
  const buf    = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').substring(0, 32);
}

function renderList(reservations, email) {
  document.getElementById('pageSubtitle').textContent =
    `${reservations.length} demande${reservations.length > 1 ? 's' : ''} trouvée${reservations.length > 1 ? 's' : ''} pour ${email}`;

  const html = reservations.map(rdv => {
    const st      = STATUS_CONFIG[rdv.status] || STATUS_CONFIG.pending;
    const icon    = SERVICE_ICONS[rdv.service] || '🔧';
    const dateStr = formatDate(rdv.dateKey);
    const created = formatCreatedAt(rdv.createdAt);
    const timeLabel = rdv.timeLabel || rdv.time || '–';

    return `
      <a href="suivi-rdv.html?id=${rdv.id}" class="demande-card">
        <div class="demande-card-header">
          <div class="demande-card-service">${icon} ${rdv.service || '–'}</div>
          <span class="status-badge ${st.cls}">${st.label}</span>
        </div>
        <div class="demande-card-body">
          <div class="demande-info-row">📅 <span>${dateStr}</span></div>
          <div class="demande-info-row">🕐 <span>${timeLabel}</span></div>
          <div class="demande-info-row">📍 <span>${rdv.adresse || '–'}</span></div>
          <div class="demande-info-row">💰 <span>${rdv.price || '–'}</span></div>
        </div>
        <div class="demande-card-footer">
          <span style="color:var(--muted);font-size:0.78rem">${created}</span>
          <span>Voir le détail →</span>
        </div>
      </a>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="demandes-list">${html}</div>
    <div class="actions" style="margin-top:0.5rem">
      <a href="makouez-it-rdv.html" class="btn-primary">+ Nouvelle demande</a>
      <a href="index.html" class="btn-outline">← Retour au site</a>
    </div>
  `;
}

function showEmpty(email) {
  document.getElementById('pageSubtitle').textContent = `Aucune demande trouvée pour ${email}`;
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">Aucune demande trouvée</div>
      <div class="empty-sub">Nous n'avons trouvé aucune réservation associée à cette adresse email.</div>
      <div class="actions">
        <a href="makouez-it-rdv.html" class="btn-primary">Prendre rendez-vous</a>
        <a href="index.html" class="btn-outline">← Retour au site</a>
      </div>
    </div>
  `;
}

function showError(title, desc) {
  document.getElementById('pageSubtitle').textContent = '';
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🔐</div>
      <div class="empty-title">${title}</div>
      <div class="empty-sub">${desc}</div>
      <div class="actions">
        <a href="index.html" class="btn-primary">← Retour au site</a>
      </div>
    </div>
  `;
}

load();
</script>
</body>
</html>
